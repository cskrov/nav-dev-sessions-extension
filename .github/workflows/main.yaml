name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".zed/**"
      - ".vscode/**"
      - ".gitattributes"
      - ".gitignore"
      - ".tool-versions"
      - "AGENTS.md"
      - "README.md"
      - "screenshots/**"
      - "biome.json"

jobs:
  build-and-release:
    name: Build and Release
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build extension
        id: build
        uses: ./.github/actions/build-extension

      - name: Sign Firefox extension
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          bun run firefox:sign
          mv dist/*.xpi dist/nav_dev_sessions_extension-firefox.xpi

      - name: Generate changelog
        env:
          VERSION: ${{ steps.build.outputs.version }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "## Changes" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          if [ -n "$PREVIOUS_TAG" ]; then
            git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "**Full Changelog**: [${PREVIOUS_TAG}...${VERSION}](${REPO_URL}/compare/${PREVIOUS_TAG}...${VERSION})" >> RELEASE_NOTES.md
          else
            git log --pretty=format:"- %s" >> RELEASE_NOTES.md
          fi

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.build.outputs.version }}
          artifacts: "dist/*.zip,dist/*.xpi"
          bodyFile: "RELEASE_NOTES.md"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
